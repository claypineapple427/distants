<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DISTANTS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .panel {
      text-align: center;
    }

    button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }

    textarea {
      font-size: 16px;
      padding: 10px;
    }
  </style>
</head>

<body>

  <!-- PANEL -->
  <div class="panel">
    <textarea id="entryBox" style="width:80%; height:100px;"></textarea>

    <br><br>

    <button onclick="insertDot()">•</button>
    <button onclick="insertLine()">—</button>
    <button onclick="clearBox()">□</button>

    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>

    <button onclick="processInput()">→</button>
  </div>

  <!-- RESPONSE AREA -->
  <div id="responseArea" style="
    margin-top:20px;
    min-height:60px;
    border-top:1px solid rgba(0,0,0,0.1);
  "></div>

  <!-- SCRIPT (ALL BEHAVIOR) -->
  <script>
    let history = [];
    let future = [];

    function saveState() {
      const box = document.getElementById("entryBox");
      history.push(box.value);
      future = [];
    }

    function insertDot() {
      saveState();
      const box = document.getElementById("entryBox");
      box.value += ". ";
    }

    function insertLine() {
      saveState();
      const box = document.getElementById("entryBox");
      box.value += "\n";
    }

    function clearBox() {
      saveState();
      document.getElementById("entryBox").value = "";
    }

    function goBack() {
      const box = document.getElementById("entryBox");
      if (history.length > 0) {
        future.push(box.value);
        box.value = history.pop();
      }
    }

    function goForward() {
      const box = document.getElementById("entryBox");
      if (future.length > 0) {
        history.push(box.value);
        box.value = future.pop();
      }
    }

    function processInput() {
      const box = document.getElementById("entryBox");
      let text = box.value.trim();

      if (!text) text = "...";

      const area = document.getElementById("responseArea");

      const entry = document.createElement("div");
      entry.style.padding = "8px";
      entry.style.marginTop = "5px";
      entry.style.border = "1px solid rgba(0,0,0,0.1)";
      entry.innerText = text;

      area.appendChild(entry);
    }
  </script>

</body>
</html>
